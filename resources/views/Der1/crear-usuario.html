<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Colaborador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card border-0 shadow-sm rounded-3 p-4 bg-white" style="width: 100%; max-width: 500px;">
        <h4 class="fw-bold text-center mb-3"><i class="bi bi-person-plus text-success me-2"></i>Registrar Nuevo Colaborador</h4>
        
        <form id="formRegistro">
            <div class="mb-2"><label class="form-label small fw-bold">Cédula de Identidad (CI)</label><input type="text" id="reg-ci" class="form-control" required placeholder="Ej. 1234567 LP"></div>
            <div class="mb-2"><label class="form-label small fw-bold">Nombre Completo</label><input type="text" id="reg-nombre" class="form-control" required></div>
            <div class="mb-2"><label class="form-label small fw-bold">Puesto Actual</label><input type="text" id="reg-puesto" class="form-control" required placeholder="Ej. Analista"></div>
            <div class="mb-2"><label class="form-label small fw-bold">Áreas Vinculadas</label><input type="text" id="reg-area" class="form-control" placeholder="Ej. General"></div>
            <div class="mb-3"><label class="form-label small fw-bold">Ubicación Física</label><input type="text" id="reg-ubicacion" class="form-control" placeholder="Ej. Oficina Central"></div>
            
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-2">Guardar Registro</button>
            <a href="./login.html" class="btn btn-sm btn-outline-secondary w-100">Volver al Login</a>
        </form>
    </div>

    <script>
        if (!localStorage.getItem('admin_auth')) window.location.replace('./login.html');

        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                ci: document.getElementById('reg-ci').value.trim(),
                nombre: document.getElementById('reg-nombre').value.trim(),
                puesto: document.getElementById('reg-puesto').value.trim(),
                area: document.getElementById('reg-area').value.trim(),
                ubicacion: document.getElementById('reg-ubicacion').value.trim()
            };

            const response = await fetch('http://127.0.0.1:8000/api/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('¡Usuario guardado en MySQL con éxito!');
                document.getElementById('formRegistro').reset();
            }
        });
    </script>
</body>
</html>
