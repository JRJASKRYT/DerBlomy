<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Recursos Propios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { background-color: #1e2229; min-height: 100vh; width: 240px; position: fixed; }
        .main-content { margin-left: 240px; padding: 2.5rem; }
        .nav-link-custom { color: #a0aec0; padding: 0.75rem 1rem; display: block; text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; }
        .nav-link-custom:hover, .nav-link-custom.active { background-color: #0d6efd; color: white; }
        .card-header-dark { background-color: #212529; color: white; font-weight: 600; }
    </style>
</head>
<body>

    <div class="d-flex">
        <!-- SIDEBAR -->
        <div class="sidebar p-3 d-flex flex-column">
            <div class="text-center my-4 text-white">
                <div class="bg-primary d-inline-flex p-3 rounded-circle mb-2"><i class="bi bi-person-fill fs-3"></i></div>
                <h6 class="fw-bold" id="sidebar-user-name">Cargando...</h6>
            </div>
            <hr class="bg-secondary">
            <nav>
                
                    <a href="./inicio.html" class="nav-link-custom"><i class="bi bi-house-door-fill me-2"></i> Inicio</a>
                    <a href="./tramites.html" class="nav-link-custom"><i class="bi bi-file-earmark-text-fill me-2"></i> Mis Trámites</a>
                    <a href="./conexiones.html" class="nav-link-custom"><i class="bi bi-diagram-3-fill me-2"></i> Mis Conexiones</a>
                    <a href="./habilitaciones.html" class="nav-link-custom "><i class="bi bi-shield-lock-fill me-2"></i> Mis Habilitaciones</a>
                    <a href="./recursos.html" class="nav-link-custom active"><i class="bi bi-archive-fill me-2"></i> Recursos Propios</a>
                
            </nav>
        </div>

        <!-- CONTENIDO -->
        <div class="main-content flex-grow-1">
            <div class="card p-4 shadow-sm bg-white border-0 mb-4">
                <h3 class="fw-bold text-dark"><i class="bi bi-archive-fill text-primary me-2"></i> Recursos Propios</h3>
                <p class="text-muted small">Administra tus herramientas, licencias y activos asignados.</p>
            </div>

            <div class="card shadow-sm border-0 bg-white">
                <div class="card-header card-header-dark py-3">Inventario de Recursos Asignados</div>
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-secondary small">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Recurso</th>
                                <th>Categoría</th>
                                <th>Identificador</th>
                                <th>Estado</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-recursos-cuerpo">
                            <tr><td colspan="6" class="text-center py-4">Cargando inventario...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Editar Recurso</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre del Recurso</label>
                        <input type="text" id="edit-nombre" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Categoría</label>
                        <input type="text" id="edit-categoria" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Estado</label>
                        <select id="edit-estado" class="form-select">
                            <option value="Asignado">Asignado</option>
                            <option value="En Revisión">En Revisión</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarCambios()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('usuario'));
        if (!user) window.location.replace('./login.html');
        document.getElementById('sidebar-user-name').textContent = user.nombre;

        let modalEdicion = new bootstrap.Modal(document.getElementById('modalEditar'));

        async function cargarRecursos() {
            const res = await fetch(`http://127.0.0.1:8000/api/recursos-propios/${user.ci}`);
            const data = await res.json();
            const tbody = document.getElementById('tabla-recursos-cuerpo');
            tbody.innerHTML = '';

            data.recursos.forEach(rec => {
                tbody.innerHTML += `
                    <tr>
                        <td class="ps-4 text-muted">#R-${rec.id}</td>
                        <td class="fw-bold">${rec.recurso}</td>
                        <td class="small text-secondary">${rec.categoria}</td>
                        <td><code>${rec.identificador}</code></td>
                        <td><span class="badge ${rec.estado === 'Asignado' ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning'}">${rec.estado}</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="abrirModal(${rec.id}, '${rec.recurso}', '${rec.categoria}', '${rec.estado}')"><i class="bi bi-pencil-fill"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="eliminarRecurso(${rec.id})"><i class="bi bi-trash-fill"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function abrirModal(id, nombre, cat, estado) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nombre').value = nombre;
            document.getElementById('edit-categoria').value = cat;
            document.getElementById('edit-estado').value = estado;
            modalEdicion.show();
        }

        async function guardarCambios() {
            const id = document.getElementById('edit-id').value;
            const data = {
                recurso: document.getElementById('edit-nombre').value,
                categoria: document.getElementById('edit-categoria').value,
                estado: document.getElementById('edit-estado').value
            };
            await fetch(`http://127.0.0.1:8000/api/recursos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            modalEdicion.hide();
            cargarRecursos();
        }

        async function eliminarRecurso(id) {
            if (!confirm('¿Eliminar este recurso permanentemente?')) return;
            await fetch(`http://127.0.0.1:8000/api/recursos/${id}`, { method: 'DELETE' });
            cargarRecursos();
        }

        window.onload = cargarRecursos;
    </script>
</body>
</html>
