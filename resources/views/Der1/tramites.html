<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventana de Mis Trámites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { background-color: #1e2229; min-height: 100vh; color: #fff; width: 240px; position: fixed; }
        .main-content { margin-left: 240px; padding: 2.5rem; }
        .nav-link-custom { color: #a0aec0; border-radius: 8px; padding: 0.75rem 1rem; display: block; text-decoration: none; margin-bottom: 0.5rem; }
        .nav-link-custom:hover, .nav-link-custom.active { background-color: #0d6efd; color: white; }
        .btn-logout { background: none; border: 1px solid #dc3545; color: #dc3545; width: 100%; border-radius: 6px; }
        .btn-logout:hover { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <div class="d-flex">
        <div class="sidebar p-3 d-flex flex-column justify-content-between">
            <div>
                <div class="text-center my-4">
                    <div class="bg-primary d-inline-flex p-3 rounded-circle mb-2"><i class="bi bi-person-fill fs-3 text-white"></i></div>
                    <h6 class="fw-bold mb-0" id="sidebar-user-name">Cargando...</h6>
                </div>
                <hr class="bg-secondary">
                <nav class="mt-3">
                    <a href="./inicio.html" class="nav-link-custom"><i class="bi bi-house-door-fill me-2"></i> Inicio</a>
                    <a href="./tramites.html" class="nav-link-custom active"><i class="bi bi-file-earmark-text-fill me-2"></i> Mis Trámites</a>
                    <a href="./conexiones.html" class="nav-link-custom "><i class="bi bi-diagram-3-fill me-2"></i> Mis Conexiones</a>
                    <a href="./habilitaciones.html" class="nav-link-custom"><i class="bi bi-file-earmark-text-fill me-2"></i>Mis Habilitaciones</a>
                    <a href="./recursos.html" class="nav-link-custom"><i class="bi bi-archive-fill me-2"></i> Recursos Propios</a>
                </nav>
            </div>
            <div>
                <button onclick="logout()" class="btn-logout py-2 small"><i class="bi bi-box-arrow-left me-1"></i> Salir</button>
            </div>
        </div>

        <div class="main-content flex-grow-1">
            <h3><i class="bi bi-file-earmark-text-fill text-primary me-2"></i> Ventana de Mis Trámites</h3>

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm bg-white border-0 rounded-3">
                        <h5>Nueva Solicitud</h5>
                        <form id="formTramiteWeb" class="mt-2">
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-secondary">Nombre del Trámite</label>
                                <input type="text" id="t-nombre" class="form-control" placeholder="Ej. Vacaciones" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-secondary">Estado Inicial</label>
                                <select id="t-estado" class="form-select">
                                    <option value="iniciado">Iniciado</option>
                                    <option value="en curso">En Curso</option>
                                    <option value="terminado">Terminado</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-3">Guardar Trámite</button>
                        </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card p-3 shadow-sm bg-white border-0 rounded-3">
                        <h5>Historial Registrado</h5>
                        <table class="table table-striped mt-3 align-middle">
                            <thead>
                                <tr class="text-secondary small">
                                    <th>ID</th>
                                    <th>Trámite</th>
                                    <th>Estado</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-tramites-cuerpo">
                                <tr>
                                    <td colspan="4" class="text-center text-muted py-3">Cargando historial de trámites...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Validar sesión local (Conservamos los datos guardados en el Login)
        const user = JSON.parse(localStorage.getItem('usuario'));
        if (!user) {
            window.location.replace('./login.html');
        } else {
            document.getElementById('sidebar-user-name').textContent = user.nombre;
        }

        // 2. Cargar Trámites usando la nueva ruta GET por CI
        async function cargarHistorialTramites() {
            try {
                // Consultamos a la nueva ruta configurada: /api/tramites/{ci}
                const response = await fetch(`http://127.0.0.1:8000/api/tramites/${user.ci}`);
                
                if (!response.ok) {
                    throw new Error("Error en la respuesta del servidor");
                }
                
                const tramites = await response.json();
                const tbody = document.getElementById('tabla-tramites-cuerpo');
                tbody.innerHTML = '';

                // Validamos si la colección de trámites está vacía
                if (!Array.isArray(tramites) || tramites.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">No tienes ningún trámite registrado.</td></tr>`;
                    return;
                }

                // Renderizamos fila por fila respetando tus capturas de pantalla
                tramites.forEach(t => {
                    let badgeHTML = '';
                    const estadoNormalizado = t.estado ? t.estado.toLowerCase() : 'iniciado';

                    // Badges exactos a los que tenías en Blade originalmente
                    if (estadoNormalizado === 'iniciado') {
                        badgeHTML = `<span class="badge bg-secondary text-uppercase px-2 py-1">INICIADO</span>`;
                    } else if (estadoNormalizado === 'en curso') {
                        badgeHTML = `<span class="badge bg-warning text-dark text-uppercase px-2 py-1">EN CURSO</span>`;
                    } else if (estadoNormalizado === 'terminado') {
                        badgeHTML = `<span class="badge bg-success text-uppercase px-2 py-1">TERMINADO</span>`;
                    }

                    tbody.innerHTML += `
                        <tr class="align-middle">
                            <td class="text-muted fw-normal py-3">${t.id}</td>
                            <td class="text-dark fw-bold">${t.nombre}</td>
                            <td>${badgeHTML}</td>
                            <td class="text-end">
                                <div class="d-inline-flex gap-2">
                                    <a href="./documentacion.html?id=${t.id}" class="btn btn-sm btn-outline-primary rounded-3 px-3">
                                        <i class="bi bi-eye-fill me-1"></i> Requisitos
                                    </a>
                                    <button onclick="eliminarTramiteWeb(${t.id})" class="btn btn-sm btn-outline-danger rounded-3 px-2">
                                        <i class="bi bi-trash3-fill"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error("Error al mapear tabla:", error);
                document.getElementById('tabla-tramites-cuerpo').innerHTML = `
                    <tr>
                        <td colspan="4" class="text-center text-danger py-4 fw-bold">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Error de conexión o autenticación con Laravel.
                        </td>
                    </tr>`;
            }
        }

        // 3. Procesar el Formulario POST para guardar nuevos trámites
        document.getElementById('formTramiteWeb').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Adaptado perfectamente a tus reglas de validación en routes/api.php
            const payload = {
                usuario_ci: user.ci, // Requerido por tu validador
                nombre: document.getElementById('t-nombre').value.trim(), // Requerido por tu validador
                estado: document.getElementById('t-estado').value // Opcional (toma 'iniciado' por defecto)
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/api/tramites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();

                if (response.ok && resData.success) {
                    document.getElementById('formTramiteWeb').reset();
                    cargarHistorialTramites(); // Refrescar la lista de inmediato
                } else {
                    alert('Error desde Laravel: ' + (resData.message || 'Error desconocido'));
                }
            } catch (error) {
                alert('Error de red al intentar conectar con el servidor.');
            }
        });

        // 4. Eliminar trámite (Opcional - por si lo requieres de manera local)
        async function eliminarTramiteWeb(id) {
            if (!confirm('¿Seguro que deseas eliminar este trámite?')) return;
            alert('Ruta de eliminación no definida aún en tu routes/api.php');
        }

        function logout() {
            localStorage.clear();
            window.location.replace('./login.html');
        }

        // Carga inicial automática al renderizar la ventana
        window.onload = cargarHistorialTramites;
    </script>
</body>
</html>
